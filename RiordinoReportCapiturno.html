<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riordino Report Capiturno · Comprensorio di Foggia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --blue-deep:   #0B2E5C;
    --blue-mid:    #14468C;
    --blue-line:   #C7D4E6;
    --paper:       #F6F7F9;
    --ink:         #1B2430;
    --ink-soft:    #5B6472;
    --orange:      #E97132;
    --white:       #FFFFFF;
    --shadow:      0 1px 2px rgba(11,46,92,0.06), 0 8px 24px rgba(11,46,92,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .rail{
    height:6px;
    width:100%;
    background:#0B2E6B;
  }
  header{
    padding:22px 32px;
    background:var(--white);
    border-bottom:1px solid var(--blue-line);
    display:flex;
    align-items:center;
    gap:18px;
  }
  header .logo{
    height:38px;
    width:auto;
    flex-shrink:0;
  }
  header .divider{
    width:1px;
    align-self:stretch;
    background:var(--blue-line);
  }
  h1{
    margin:0;
    font-size:22px;
    font-weight:700;
    color:var(--blue-deep);
    letter-spacing:-0.01em;
  }
  main{
    max-width:920px;
    margin:0 auto;
    padding:28px 24px 80px;
  }
  .panel{
    background:var(--white);
    border:1px solid var(--blue-line);
    border-radius:10px;
    box-shadow:var(--shadow);
    padding:24px;
    margin-bottom:20px;
  }
  .drop{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    border:2px dashed var(--blue-line);
    border-radius:8px;
    padding:34px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .drop:hover, .drop.drag{
    border-color:var(--orange);
    background:#FFF7F1;
  }
  .drop input{display:none;}
  .drop-icon{
    display:block;
    width:40px;height:40px;margin:0 0 12px;
    color:var(--blue-mid);
    flex-shrink:0;
  }
  .drop b{color:var(--blue-deep);}
  .drop .sub{color:var(--ink-soft); font-size:13px; margin-top:6px;}
  .filename{
    margin-top:14px;
    font-size:13.5px;
    color:var(--blue-deep);
    font-weight:600;
    display:none;
  }
  .status{
    margin-top:16px;
    font-size:13.5px;
    color:var(--ink-soft);
    display:none;
  }
  .status.active{display:block;}
  .status .dot{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--orange); margin-right:8px; animation:pulse 1s infinite ease-in-out;
  }
  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
  .status.error{color:#B3261E;}
  .status.error .dot{background:#B3261E; animation:none;}
  .status.done{color:#0E7C4A;}
  .status.done .dot{background:#0E7C4A; animation:none;}

  .actions{
    display:flex;
    gap:12px;
    margin-top:20px;
    flex-wrap:wrap;
  }
  button{
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    border-radius:7px;
    padding:11px 18px;
    cursor:pointer;
    border:1px solid transparent;
    transition:transform .06s, background .15s, box-shadow .15s;
  }
  button:active{transform:translateY(1px);}
  button:disabled{opacity:.45; cursor:not-allowed;}
  .btn-primary{
    background:var(--blue-deep);
    color:var(--white);
  }
  .btn-primary:not(:disabled):hover{background:var(--blue-mid);}
  .btn-ghost{
    background:var(--white);
    color:var(--blue-deep);
    border-color:var(--blue-line);
  }
  .btn-ghost:not(:disabled):hover{border-color:var(--blue-mid);}
  .btn-accent{
    background:var(--orange);
    color:var(--white);
  }
  .btn-accent:not(:disabled):hover{filter:brightness(1.05);}

  h2.section-title{
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:.09em;
    color:var(--blue-mid);
    font-weight:700;
    margin:0 0 16px;
  }

  .meta-row{
    display:flex;
    gap:22px;
    flex-wrap:wrap;
    margin-bottom:18px;
    font-size:13.5px;
  }
  .meta-row div span{display:block; color:var(--ink-soft); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px;}
  .meta-row div b{color:var(--blue-deep); font-size:14.5px;}

  .macro{
    margin-bottom:22px;
    border:1px solid var(--blue-line);
    border-radius:8px;
    overflow:hidden;
  }
  .macro-head{
    background:var(--blue-deep);
    color:var(--white);
    padding:10px 16px;
    font-weight:700;
    font-size:14.5px;
    letter-spacing:.01em;
  }
  .area{
    border-top:1px solid var(--blue-line);
    padding:14px 16px 16px;
  }
  .area:first-child{border-top:none;}
  .area-head{
    font-weight:700;
    color:var(--orange);
    font-size:13.5px;
    text-transform:uppercase;
    letter-spacing:.04em;
    margin-bottom:10px;
  }
  .turno-block{
    padding:10px 12px;
    background:var(--paper);
    border-radius:6px;
    margin-bottom:8px;
  }
  .turno-block:last-child{margin-bottom:0;}
  .turno-title{
    font-weight:700;
    color:var(--blue-mid);
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:.05em;
    margin-bottom:6px;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }
  .turno-title .capo{color:var(--ink-soft); font-weight:600; text-transform:none; letter-spacing:0;}
  .note{
    font-size:13.5px;
    line-height:1.55;
    color:var(--ink);
    margin:0 0 6px;
  }
  .note .tag{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    color:var(--white);
    background:var(--blue-mid);
    padding:1px 6px;
    border-radius:3px;
    margin-right:7px;
    vertical-align:1px;
    letter-spacing:.03em;
  }
  .note .tag.lcq{background:var(--orange);}

  footer{
    text-align:center;
    color:var(--ink-soft);
    font-size:12px;
    padding:20px;
  }
  .hidden{display:none !important;}
</style>
</head>

const filenameEl = document.getElementById('filename');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const previewPanel = document.getElementById('previewPanel');
const previewEl = document.getElementById('preview');
const metaRow = document.getElementById('metaRow');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');

let lastResults = null; // array of parsed reports (sorted by date) kept for PDF generation

['dragover','dragenter'].forEach(evt=>{
  dropEl.addEventListener(evt, e=>{ e.preventDefault(); dropEl.classList.add('drag'); });
});
['dragleave','drop'].forEach(evt=>{
  dropEl.addEventListener(evt, e=>{ e.preventDefault(); dropEl.classList.remove('drag'); });
});
dropEl.addEventListener('drop', e=>{
  const files = Array.from(e.dataTransfer.files);
  if(files.length) handleFiles(files);
});
fileInput.addEventListener('change', e=>{
  const files = Array.from(e.target.files);
  if(files.length) handleFiles(files);
});
resetBtn.addEventListener('click', ()=>{
  fileInput.value = '';
  filenameEl.style.display='none';
  previewPanel.classList.add('hidden');
  setStatus('','');
});

function setStatus(text, mode){
  if(!text){ statusEl.classList.remove('active'); return; }
  statusEl.classList.add('active');
  statusEl.classList.remove('error','done');
  if(mode) statusEl.classList.add(mode);
  statusText.textContent = text;
}

const MONTHS_IT = {gennaio:0,febbraio:1,marzo:2,aprile:3,maggio:4,giugno:5,luglio:6,agosto:7,settembre:8,ottobre:9,novembre:10,dicembre:11};
function parseItDate(s){
  if(!s) return NaN;
  const m = s.toLowerCase().match(/(\d{1,2})\s+([a-zà-ù]+)\s+(\d{4})/);
  if(!m) return NaN;
  const month = MONTHS_IT[m[2]];
  if(month === undefined) return NaN;
  return new Date(parseInt(m[3],10), month, parseInt(m[1],10)).getTime();
}

async function handleFiles(files){
  const pdfs = files.filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
  if(pdfs.length === 0){
    setStatus('Nessun PDF tra i file selezionati.', 'error');
    return;
  }
  filenameEl.textContent = pdfs.map(f=>f.name).join('  ·  ');
  filenameEl.style.display='block';
  previewPanel.classList.add('hidden');
  setStatus(pdfs.length === 1 ? 'Lettura del PDF in corso…' : `Lettura di ${pdfs.length} PDF in corso…`);
  try{
    const results = [];
    for(const file of pdfs){
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: buf}).promise;
      const lines = await extractLines(pdf);
      const parsed = parseReport(lines);
      if(!hasAnyData(parsed)){
        setStatus(`Struttura del report non riconosciuta nel file "${file.name}".`, 'error');
        return;
      }
      parsed.fileName = file.name;
      results.push(parsed);
    }
    // ordina cronologicamente (sabato prima di domenica)
    results.sort((a,b)=>{
      const da = parseItDate(a.reportDate), db = parseItDate(b.reportDate);
      if(isNaN(da) && isNaN(db)) return 0;
      if(isNaN(da)) return 1;
      if(isNaN(db)) return -1;
      return da - db;
    });
    lastResults = results;
    renderMeta(results);
    generatePdf(results);
    setStatus('Report riordinato: il download del PDF è partito.', 'done');
    previewPanel.classList.remove('hidden');
  }catch(err){
    console.error(err);
    setStatus('Errore durante la lettura dei PDF: ' + err.message, 'error');
  }
}

function hasAnyData(parsed){
  return parsed.macroOrder.some(m => parsed.macroData[m] && parsed.macroData[m].areaOrder.length>0);
}

// ---------- PDF TEXT EXTRACTION ----------
async function extractLines(pdf){
  const out = [];
  for(let p=1; p<=pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    let items = content.items.filter(it => it.str && it.str.trim().length>0);
    if(items.length===0) continue;
    items.sort((a,b)=> (b.transform[5]-a.transform[5]) || (a.transform[4]-b.transform[4]));

    // group items into visual lines (tolerant of small y jitter)
    const rows = [];
    let current = [];
    let lastY = null;
    items.forEach(item=>{
      const y = item.transform[5];
      if(lastY===null || Math.abs(y-lastY) < 2.5){
        current.push(item);
      } else {
        rows.push(current);
        current = [item];
      }
      lastY = y;
    });
    if(current.length) rows.push(current);

    let prevRowY = null;
    rows.forEach(rowItems=>{
      rowItems.sort((a,b)=> a.transform[4]-b.transform[4]);
      let text='';
      let prevEndX=null;
      rowItems.forEach(it=>{
        const startX = it.transform[4];
        if(prevEndX!==null){
          const gap = startX - prevEndX;
          if(gap > 1.2 && !text.endsWith(' ')) text += ' ';
        }
        text += it.str;
        prevEndX = startX + (it.width || 0);
      });
      text = text.replace(/\s+/g,' ').trim();
      if(!text) return;
      const rowY = rowItems[0].transform[5];
      const gapBefore = (prevRowY===null) ? 0 : (prevRowY - rowY);
      out.push({ text, isBreak: gapBefore > 16, page: p });
      prevRowY = rowY;
    });
    out.push({text:'__PAGE_BREAK__', isBreak:true, page:p, pageBreak:true});
  }
  return out;
}

// ---------- PARSING ----------
function parseReport(lines){
  let reportDate = '';
  const turnoCapoMap = {};
  const macroData = {};
  MACRO_ORDER.forEach(m=> macroData[m] = {areaOrder:[], areas:{}});
  const extraMacros = [];

  let curTurno=null, curMacro=null, curArea=null, curTag=null, tagPending=false;
  let buffer = [];

  function commit(){
    if(buffer.length && curMacro && curArea && curTurno){
      const text = buffer.join(' ').replace(/\s+/g,' ').trim();
      if(text){
        const md = macroData[curMacro];
        if(!md.areas[curArea]){ md.areas[curArea] = {1:[],2:[],3:[]}; md.areaOrder.push(curArea); }
        if(!md.areas[curArea][curTurno]) md.areas[curArea][curTurno] = [];
        if(tagPending){
          md.areas[curArea][curTurno].push({tag: curTag, text});
          tagPending = false;
        } else if(curTag){
          // additional segnalazione under the same already-shown tag: separate with a line, don't repeat the label
          md.areas[curArea][curTurno].push({tag: null, text, sameTagContinuation: true});
        } else {
          md.areas[curArea][curTurno].push({tag: null, text});
        }
      }
    }
    buffer = [];
  }

  for(const line of lines){
    if(line.pageBreak){ commit(); continue; }
    const t = line.text;
    if(line.isBreak) commit();

    if(/^Comprensorio di Foggia/i.test(t)) continue;
    if(/^Segnalazioni Capi Turno/i.test(t)) continue;
    if(/^Barilla$/i.test(t)) continue;
    if(/Pagina\s+\d+\s+di\s+\d+/i.test(t)) continue;
    if(/^(luned|marted|mercoled|gioved|venerd|sabato|domenica)[iìà]?\s+\d+\s+\w+\s+\d{4}$/i.test(t)) continue;

    let m;
    if((m = t.match(/^Data:\s*(.+)/i))){
      reportDate = m[1].trim();
      continue;
    }
    if((m = t.match(/^Turno:\s*(\d+)\s*Capo\s*Turno:\s*(.+)$/i))){
      commit();
      curTurno = parseInt(m[1],10);
      turnoCapoMap[curTurno] = m[2].trim();
      curArea=null; curTag=null; tagPending=false; curMacro=null;
      continue;
    }
    if((m = t.match(/^\d+\.([A-ZÀ-Ö][A-Za-zÀ-ÖØ-öø-ÿ\s\d.]{1,40})$/))){
      commit();
      const rawName = m[1].trim();
      const key = rawName.replace(/\s+/g,'').toLowerCase();
      let canon = MACRO_KEY[key];
      if(!canon){
        canon = rawName;
        if(!macroData[canon]){ macroData[canon] = {areaOrder:[], areas:{}}; extraMacros.push(canon); }
      }
      curMacro = canon;
      curArea=null; curTag=null; tagPending=false;
      continue;
    }
    if((m = t.match(/^Area:\s*(.+)/i))){
      commit();
      curArea = m[1].trim();
      curTag=null; tagPending=false;
      continue;
    }
    if((m = t.match(/^x\s+([A-Za-zÀ-ÖØ-öø-ÿ.]{1,18}(?:\s+[A-Za-zÀ-ÖØ-öø-ÿ.]{1,18}){0,2})$/i))){
      commit();
      curTag = m[1].trim().toUpperCase();
      tagPending = true;
      continue;
    }
    // divider line between distinct segnalazioni (e.g. "___________"), if present as literal text
    if(/^_{3,}$/.test(t.replace(/\s+/g,''))){
      commit();
      if(curMacro && curArea && curTurno){
        const md = macroData[curMacro];
        if(!md.areas[curArea]){ md.areas[curArea] = {1:[],2:[],3:[]}; md.areaOrder.push(curArea); }
        if(!md.areas[curArea][curTurno]) md.areas[curArea][curTurno] = [];
        md.areas[curArea][curTurno].push({divider:true});
      }
      curTag = null; tagPending=false;
      continue;
    }
    // plain body text
    if(curMacro && curArea && curTurno){
      buffer.push(t);
    }
  }
  commit();

  return {reportDate, turnoCapoMap, macroData, macroOrder: MACRO_ORDER.concat(extraMacros)};
}

// ---------- PREVIEW ----------
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMeta(results){
  metaRow.innerHTML = results.map((r, i)=>`
    <div><span>Report ${i+1}</span><b>${escapeHtml(r.reportDate || r.fileName || '—')}</b></div>
  `).join('');
}

// ---------- PDF GENERATION ----------
downloadBtn.addEventListener('click', ()=>{
  if(!lastResults) return;
  generatePdf(lastResults);
});

function generatePdf(results){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const marginX = 42;
  const maxW = pageW - marginX*2;
  let y = 0;

  const COL = {
    deep: [11,46,92],
    mid: [20,70,140],
    orange: [233,113,50],
    red: [196,32,38],
    ink: [27,36,48],
    inkSoft: [91,100,114],
    line: [199,212,230],
    white: [255,255,255]
  };

  const multiDay = results.length > 1;

  function capitalize(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  // Unione dell'ordine delle macro-aree (canoniche prima, poi le extra nell'ordine di comparsa)
  const macroOrderUnion = [];
  MACRO_ORDER.forEach(m => macroOrderUnion.push(m));
  results.forEach(r => r.macroOrder.forEach(m => { if(!macroOrderUnion.includes(m)) macroOrderUnion.push(m); }));

  // Unione dell'ordine delle aree per ciascuna macro (ordine di prima comparsa tra i report, in ordine di data)
  function areaOrderUnion(macro){
    const out = [];
    results.forEach(r=>{
      const md = r.macroData[macro];
      if(!md) return;
      md.areaOrder.forEach(a => { if(!out.includes(a)) out.push(a); });
    });
    return out;
  }

  function newPage(){
    doc.addPage();
    drawPageRail();
    y = 50;
  }
  function drawPageRail(){
    doc.setFillColor(...COL.mid);
    doc.rect(0,0,pageW,5,'F');
  }
  function ensureSpace(h){
    if(y + h > pageH - 46){
      newPage();
    }
  }

  // ---- Header ----
  drawPageRail();
  y = 46;
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.setTextColor(...COL.orange);
  doc.text('COMPRENSORIO DI FOGGIA', marginX, y);
  y += 20;
  doc.setFontSize(17);
  doc.setTextColor(...COL.deep);
  doc.text('Segnalazioni Capi Turno — Riordino per Area', marginX, y);
  y += 20;
  doc.setDrawColor(...COL.line);
  doc.setLineWidth(1);
  doc.line(marginX, y, pageW-marginX, y);
  y += 20;

  // Riepilogo date e capi turno, un rigo per report
  doc.setFontSize(10.5);
  results.forEach(r=>{
    const capoParts = [1,2,3].filter(n=>r.turnoCapoMap[n]).map(n=>`T${n}: ${r.turnoCapoMap[n]}`);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...COL.deep);
    const dateLabel = capitalize(r.reportDate || r.fileName || '—');
    doc.text(dateLabel, marginX, y);
    if(capoParts.length){
      doc.setFont('helvetica','normal');
      doc.setTextColor(...COL.inkSoft);
      doc.text('— ' + capoParts.join('   ·   '), marginX + doc.getTextWidth(dateLabel) + 6, y);
    }
    y += 15;
  });
  y += 14;

  macroOrderUnion.forEach(macro=>{
    const areas = areaOrderUnion(macro);
    if(areas.length===0) return;

    ensureSpace(30);
    doc.setFillColor(...COL.deep);
    doc.roundedRect(marginX, y-14, maxW, 22, 3, 3, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.setTextColor(...COL.white);
    doc.text(macro, marginX+10, y+1);
    y += 30;

    areas.forEach(areaName=>{
      // report che hanno contenuto per quest'area
      const dayEntries = results
        .map(r => ({r, areaData: r.macroData[macro] && r.macroData[macro].areas[areaName]}))
        .filter(e => e.areaData && [1,2,3].some(t => e.areaData[t] && e.areaData[t].length));
      if(dayEntries.length===0) return;

      ensureSpace(20);
      doc.setFont('helvetica','bold');
      doc.setFontSize(11);
      doc.setTextColor(...COL.orange);
      doc.text(('AREA: ' + areaName).toUpperCase(), marginX, y);
      y += 14;
      doc.setDrawColor(...COL.line);
      doc.setLineWidth(0.6);
      doc.line(marginX, y-9, pageW-marginX, y-9);

      dayEntries.forEach(({r, areaData})=>{
        // intestazione del giorno (solo se sono caricati più report)
        if(multiDay){
          ensureSpace(16);
          doc.setFont('helvetica','bold');
          doc.setFontSize(10.5);
          doc.setTextColor(...COL.deep);
          doc.text(capitalize(r.reportDate || r.fileName || '—'), marginX+4, y);
          y += 14;
        }

        [1,2,3].forEach(turno=>{
          const blocks = areaData[turno];
          if(!blocks || blocks.length===0) return;
          const capo = r.turnoCapoMap[turno] || '';

          ensureSpace(18);
          doc.setFont('helvetica','bold');
          doc.setFontSize(10);
          doc.setTextColor(...COL.mid);
          doc.text('TURNO ' + turno, marginX+8, y);
          if(capo){
            doc.setFont('helvetica','normal');
            doc.setTextColor(...COL.inkSoft);
            doc.text('— Capo Turno: ' + capo, marginX+8+doc.getTextWidth('TURNO ' + turno)+6, y);
          }
          y += 13;

          blocks.forEach(b=>{
            if(b.divider){
              ensureSpace(14);
              doc.setDrawColor(...COL.line);
              doc.setLineWidth(0.8);
              doc.line(marginX+16, y-2, pageW-marginX-16, y-2);
              y += 12;
              return;
            }
            if(b.sameTagContinuation){
              ensureSpace(12);
              doc.setDrawColor(...COL.line);
              doc.setLineWidth(0.6);
              doc.line(marginX+16, y-6, pageW-marginX-16, y-6);
              y += 6;
            }
            doc.setFont('helvetica','normal');
            doc.setFontSize(9.6);
            doc.setTextColor(...COL.ink);
            let prefix = '';
            if(b.tag){
              prefix = '[' + b.tag + ']  ';
            }
            const wrapped = doc.splitTextToSize(prefix + b.text, maxW - 16);
            const blockH = wrapped.length * 12.2 + 6;
            ensureSpace(blockH);
            wrapped.forEach((ln, idx)=>{
              if(idx===0 && b.tag){
                const tagStr = '[' + b.tag + ']';
                doc.setFont('helvetica','bold');
                doc.setTextColor(...COL.red);
                doc.text(tagStr, marginX+16, y);
                const tagW = doc.getTextWidth(tagStr+' ');
                doc.setFont('helvetica','normal');
                doc.setTextColor(...COL.ink);
                doc.text(ln.slice(tagStr.length+1), marginX+16+tagW, y);
              } else {
                doc.text(ln, marginX+16, y);
              }
              y += 12.2;
            });
            y += 4;
          });
          y += 4;
        });
        y += multiDay ? 6 : 0;
      });
      y += 10;
    });
    y += 4;
  });

  // Footer page numbers
  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...COL.inkSoft);
    doc.text(`Pagina ${i} di ${pageCount}`, pageW-marginX, pageH-24, {align:'right'});
    doc.text(multiDay ? 'Riordinato automaticamente dai report originali' : 'Riordinato automaticamente dal report originale', marginX, pageH-24);
  }

  const safeDates = results.map(r => (r.reportDate||'report').replace(/\s+/g,'_')).join('__');
  doc.save(`Report_per_Area_${safeDates}.pdf`);
}
</script>
